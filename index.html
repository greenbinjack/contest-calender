<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contest Calender</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="./styles.css">

    <!-- PWA & Mobile Install -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="icon" type="image/png" href="./icon-512.png">
    <link rel="apple-touch-icon" href="./icon-512.png">

    <!-- GSAP Core & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body class="theme-dark">
    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="./icon-512.png" alt="App Icon" class="splash-logo">
    </div>

    <!-- Antigravity Background Ecosystem -->
    <div class="obsidian-void"></div>
    <div class="crimson-glow"></div>
    <div id="code-particles"></div>

    <div class="app-container">
        <header class="glass-header">
            <div class="brand">
                <div class="logo-mark"><i class="fa-solid fa-bolt"></i></div>
                <span class="brand-text">Contest Calender</span>
            </div>
            <!--
            <div class="actions">
                <button id="enable-alerts-btn" class="subscribe-btn"><i class="fa-regular fa-bell-slash"></i> Alerts: OFF</button>
            </div>
            -->
        </header>

        <div id="status-container" class="status-panel hidden"></div>

        <main class="list-container" id="contest-list">
            <!-- Cards injected via JS -->
        </main>
    </div>

    <script src="./app.js"></script>
</body>

</html>
