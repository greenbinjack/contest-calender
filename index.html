<!DOCTYPE html>
<html lang="en" class="theme-dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contest Calender</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="app-container">
        <header class="glass-header">
            <div class="brand">
                <div class="logo-mark"><i class="fa-solid fa-bolt"></i></div>
                <span class="brand-text">Contest Calender</span>
            </div>

            <div class="actions">
                <button id="theme-toggle" class="nav-btn" aria-label="Toggle Theme">
                    <i class="fa-solid fa-moon dark-icon"></i>
                    <i class="fa-solid fa-sun light-icon"></i>
                </button>
            </div>
        </header>

        <div id="status-container" class="status-panel hidden"></div>

        <main class="list-container" id="contest-list">
            <!-- Cards injected via JS -->
        </main>
    </div>

    <script src="./app.js"></script>
</body>

</html>
